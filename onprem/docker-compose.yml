version: "3.9"

# ── Vaultak On-Premises Deployment ────────────────────────────────────────────
# Deploy the full Vaultak stack in your own infrastructure.
# No data leaves your VPC. Full air-gap support available.
#
# Quick start:
#   cp .env.example .env
#   docker-compose up -d
#   docker-compose exec backend python setup.py
#
# Access:
#   Dashboard: http://localhost:3000
#   API:       http://localhost:8000
#   Docs:      http://localhost:3001

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vaultak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-vaultak}
      POSTGRES_USER:     ${POSTGRES_USER:-vaultak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaultak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaultak-internal

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vaultak-backend
    restart: unless-stopped
    environment:
      DATABASE_URL:    postgresql://${POSTGRES_USER:-vaultak}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vaultak}
      ADMIN_KEY:       ${ADMIN_KEY}
      ENVIRONMENT:     ${ENVIRONMENT:-production}
      # SIEM integrations (optional)
      VAULTAK_SPLUNK_URL:              ${VAULTAK_SPLUNK_URL:-}
      VAULTAK_SPLUNK_TOKEN:            ${VAULTAK_SPLUNK_TOKEN:-}
      VAULTAK_DATADOG_API_KEY:         ${VAULTAK_DATADOG_API_KEY:-}
      VAULTAK_SENTINEL_WORKSPACE_ID:   ${VAULTAK_SENTINEL_WORKSPACE_ID:-}
      VAULTAK_SENTINEL_SHARED_KEY:     ${VAULTAK_SENTINEL_SHARED_KEY:-}
      VAULTAK_ELASTIC_URL:             ${VAULTAK_ELASTIC_URL:-}
      VAULTAK_WEBHOOK_URL:             ${VAULTAK_WEBHOOK_URL:-}
      VAULTAK_SLACK_WEBHOOK:           ${VAULTAK_SLACK_WEBHOOK:-}
      VAULTAK_PAGERDUTY_KEY:           ${VAULTAK_PAGERDUTY_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vaultak-internal
      - vaultak-external

  # ── React dashboard ────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
        REACT_APP_CLERK_PUBLISHABLE_KEY: ${REACT_APP_CLERK_PUBLISHABLE_KEY}
    container_name: vaultak-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - vaultak-external

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vaultak-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - dashboard
    networks:
      - vaultak-external

volumes:
  postgres_data:
    driver: local

networks:
  vaultak-internal:
    driver: bridge
    internal: true
  vaultak-external:
    driver: bridge
